<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex01</title>
    <style>
        body {
            background-color: rgb(54, 101, 255);
            font: normal 15px Arial;

        }
        header{
            color: white;
            text-align: center;
        }
        section{
            background: white;
            border-radius: 10px;
            padding: 15px;
            width: 500px;
            margin: auto;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.363);
        }
        #dados p{
            display: inline-block;
        }
        #dados input{
            display:inline-block;
        }
        footer{
            color: white;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

<body>
    <header>
        <h1 class="titulo">Titulo</h1>
    </header>
    <section>
        
            <div id="dados">
                <p>Número: <input type="number" name="inicio" id="txti"></p>
                <input type="button" value="Gerar Tabuada" onclick="tabuada()">
            </div>

            <div>
                <select name="tabuada" id="lista" size="10" style="width: 100%;">
                    <option>Digite um número acima</option>
                </select>
            </div>
    </section>

    <footer>
        <p>&copy; CursoemVideo</p>
    </footer>
    <script src="Ex02.js"></script>
</body>

</html>
