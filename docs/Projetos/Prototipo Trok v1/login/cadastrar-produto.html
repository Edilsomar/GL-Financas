<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROK - Anunciar Produto</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container-cadastro {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-grupo {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-grupo label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }
        .form-grupo input, .form-grupo textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn-anunciar {
            width: 100%;
            background-color: #e96e28;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-anunciar:hover {
            background-color: #d15d1f;
        }
    </style>
</head>
<body>
    <header id="cabecalho">
        <a href="index.html" style="text-decoration: none; color: white; font-weight: bold;">← Voltar</a>
        <h2>Anunciar</h2>
        <div style="width: 50px;"></div>
    </header>

    <main class="container-cadastro">
        <form id="formProduto">
            <div class="form-grupo">
                <label>O que você quer trocar?</label>
                <input type="text" id="prodNome" placeholder="Ex: Controle de PS4" required>
            </div>

            <div class="form-grupo">
                <label>Descrição (O que você busca?)</label>
                <textarea id="prodDescricao" rows="4" placeholder="Ex: Troco por jogos de Switch ou controle de Xbox" required></textarea>
            </div>

            <div class="form-grupo">
                <label>Categoria do Item</label>
                <select id="prodCategoria" required>
                    <option value="" disabled selected>Selecione uma categoria</option>
                    <option value="Eletrônicos">Eletrônicos</option>
                    <option value="Games">Games</option>
                    <option value="Esportes">Esportes</option>
                    <option value="Música">Música</option>
                    <option value="Casa & Móveis">Casa & Móveis</option>
                    <option value="Ferramentas">Ferramentas</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>

            <div class="form-grupo">
                <label>Fotos do Produto (Selecione até 3)</label>
                <input type="file" id="prodFoto" accept="image/*" multiple required>
                <p style="font-size: 12px; color: #666;">Dica: Segure "Ctrl" para selecionar mais de uma foto.</p>
            </div>

            <button type="submit" class="btn-anunciar">Publicar no TROK</button>
        </form>
    </main>

    <script>
        document.getElementById('formProduto').addEventListener('submit', async function(e) {
    e.preventDefault();

    const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
    const fotosArquivos = document.getElementById('prodFoto').files;
    
    // Limitamos a 3 fotos para não pesar o navegador
    const totalFotos = Math.min(fotosArquivos.length, 3);
    const listaDeFotos = [];

    // Função para ler cada foto
    const lerFoto = (arquivo) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(arquivo);
        });
    };

    // Lemos todas as fotos selecionadas
    for (let i = 0; i < totalFotos; i++) {
        const fotoBase64 = await lerFoto(fotosArquivos[i]);
        listaDeFotos.push(fotoBase64);
    }

    const novoProduto = {
        id: Date.now(),
        nome: document.getElementById('prodNome').value,
        categoria: document.getElementById('prodCategoria').value,
        descricao: document.getElementById('prodDescricao').value,
        fotos: listaDeFotos, // Agora é uma LISTA de fotos
        donoNome: usuarioLogado.nome,
        donoFoto: usuarioLogado.foto,
        donoEndereco: usuarioLogado.endereco
    };

    let produtos = JSON.parse(localStorage.getItem('bancoProdutos')) || [];
    produtos.push(novoProduto);
    localStorage.setItem('bancoProdutos', JSON.stringify(produtos));

    alert("Anúncio publicado com " + listaDeFotos.length + " foto(s)!");
    window.location.href = 'index.html';
});
    </script>
</body>
</html>
