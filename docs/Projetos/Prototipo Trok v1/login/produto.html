<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f4f4f4; margin: 0; font-family: sans-serif; }
        #cabecalho { background-color: #e96e28; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .container-detalhes { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; }
        .vitrine { background: #fff; padding: 10px; text-align: center; }
        .foto-grande { width: 100%; max-height: 350px; object-fit: contain; border-radius: 8px; }
        .miniaturas { display: flex; gap: 10px; margin-top: 15px; justify-content: center; overflow-x: auto; }
        .miniaturas img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 2px solid #ddd; cursor: pointer; }
        .miniaturas img.ativa { border-color: #e96e28; }
        .info-produto { padding: 20px; }
        .card-dono { display: flex; align-items: center; gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 12px; margin-top: 20px; }
        .foto-dono { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .btn-interessado { background-color: #e96e28; color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: bold; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container-detalhes">
        <header id="cabecalho">
            <a href="index.html" style="color: white; text-decoration: none;">✕</a>
            <h2 style="margin: 0; font-size: 18px;">Detalhes do Item</h2>
            <div style="width: 20px;"></div>
        </header>

        <main id="conteudo-produto"></main>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        const urlParams = new URLSearchParams(window.location.search);
        const produtoId = parseInt(urlParams.get('id'));
        const produtos = JSON.parse(localStorage.getItem('bancoProdutos')) || [];
        const p = produtos.find(item => item.id === produtoId);

        if (p) {
            const fotos = p.fotos || [p.foto];
            const ehMeuItem = usuarioLogado && p.donoNome === usuarioLogado.nome;

            document.getElementById('conteudo-produto').innerHTML = `
                <div class="vitrine">
                    <img src="${fotos[0]}" id="fotoPrincipal" class="foto-grande">
                    <div class="miniaturas">
                        ${fotos.map((f, index) => `
                            <img src="${f}" onclick="trocarFoto(this)" class="${index === 0 ? 'ativa' : ''}">
                        `).join('')}
                    </div>
                </div>
                <div class="info-produto">
                    <span style="color:#e96e28; font-size:12px; font-weight:bold;">${p.categoria}</span>
                    <h1 style="font-size:24px; margin:10px 0;">${p.nome}</h1>
                    <p style="color:#666; line-height:1.5;">${p.descricao}</p>

                    <div class="card-dono">
                        <img src="${p.donoFoto}" class="foto-dono">
                        <div>
                            <p style="font-weight:bold; margin:0;">${p.donoNome}</p>
                            <p style="font-size:12px; color:#888; margin:0;">📍 ${p.donoEndereco}</p>
                        </div>
                    </div>

                    ${ehMeuItem 
                        ? `<button class="btn-interessado" style="background:#ccc; cursor:not-allowed;" disabled>TU ÉS O DONO</button>`
                        : `<button class="btn-interessado" onclick="alert('A iniciar chat com ${p.donoNome}...')">TENHO INTERESSE</button>`
                    }
                </div>
            `;
        }

        function trocarFoto(el) {
            document.getElementById('fotoPrincipal').src = el.src;
            document.querySelectorAll('.miniaturas img').forEach(img => img.classList.remove('ativa'));
            el.classList.add('ativa');
        }
    </script>
</body>
</html>
