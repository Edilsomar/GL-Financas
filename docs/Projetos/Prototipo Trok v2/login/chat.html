<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TROK - Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* RESET TOTAL E ESTRUTURA DVH */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            background-color: #f0f2f5; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
        }

        /* CABEÇALHO REVISADO E CENTRALIZADO (Padrão de UX) */
        #cabecalho { 
            display: flex; 
            align-items: center; 
            padding: 10px 15px; 
            background: white; 
            border-bottom: 1px solid #eee; 
            flex-shrink: 0;
            z-index: 10;
        }

        .btn-voltar { text-decoration: none; color: #e96e28; font-size: 24px; font-weight: bold; margin-right: 10px; flex-shrink: 0; }
        
        .conteiner_cabecalho_central { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            flex: 1; 
            gap: 2px;
        }
        
        .foto-perfil-chat { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #eee; }
        .info-cabecalho-chat h2 { font-size: 14px; margin: 0; text-align: center; color: #333; }
        .info-cabecalho-chat span { font-size: 10px; color: #888; display: block; text-align: center; }

        /* ÁREA DE MENSAGENS COM SCROLL E MARGEM DE SEGURANÇA */
        #boxMensagens { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            /* Margem de segurança extra para a barra de input não cobrir nada */
            padding-bottom: 50px; 
        }

        /* BALÕES DE CHAT REVISADOS (Padrão visual) */
        .balao-msg { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .msg-minha { align-self: flex-end; background-color: #e96e28; color: white; border-bottom-right-radius: 2px; }
        .msg-outro { align-self: flex-start; background-color: white; color: #333; border-bottom-left-radius: 2px; }
        .hora-msg { font-size: 10px; opacity: 0.7; display: block; margin-top: 4px; text-align: right; }

        /* RODAPÉ DE DIGITAÇÃO REVISADO (Padrão UX) */
        #areaEnvio { 
            background: white; 
            padding: 10px 15px; 
            border-top: 1px solid #ddd;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 10px); 
        }

        #formChat { display: flex; align-items: center; gap: 10px; width: 100%; }
        
        #inputMensagem { 
            flex: 1; /* O SEGREDO: Isso faz o input crescer e ocupar todo o espaço */
            padding: 12px 18px; 
            border: 1px solid #eee; 
            border-radius: 25px; 
            outline: none; 
            font-size: 15px;
            background: #f8f9fa;
        }

        #btnEnviar { 
            background: #e96e28; 
            border: none; 
            color: white; 
            width: 46px; 
            height: 46px; 
            border-radius: 50%; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header id="cabecalho">
        <a href="javascript:void(0)" onclick="voltarInteligente()" class="btn-voltar">←</a>
        <div class="conteiner_cabecalho_central">
            <img src="" id="fotoOutroUsuario" class="foto-perfil-chat">
            <div class="info-cabecalho-chat">
                <h2 id="nomeOutroUsuario">...</h2>
                <span id="sobreProduto"></span>
            </div>
        </div>
    </header>

    <main id="boxMensagens">
        </main>

    <footer id="areaEnvio">
        <form id="formChat">
            <input type="text" id="inputMensagem" placeholder="Escreva sua mensagem..." autocomplete="off">
            <button type="submit" id="btnEnviar">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </form>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    
    <script src="chat.js"></script>
</body>
</html>
