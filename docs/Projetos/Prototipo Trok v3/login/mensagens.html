<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROK - Minhas Conversas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container-chats { padding: 15px; max-width: 600px; margin: 0 auto; padding-top: 20px; }
        .card-chat { display: flex; align-items: center; padding: 15px; background: white; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; transition: 0.2s; position: relative; overflow: hidden; }
        .card-chat:hover { transform: translateY(-2px); border-color: #e96e28; }
        
        .avatar-chat-container { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; flex-shrink: 0; overflow: hidden; border: 1px solid #eee; position: relative; }
        .avatar-inicial { width: 100%; height: 100%; background: #e96e28; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }

        .info-chat { flex: 1; overflow: hidden; padding-right: 70px; }
        .info-chat h3 { margin: 0 0 2px 0; font-size: 16px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info-chat p { margin: 0; font-size: 13px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .nova-msg { 
            background: #e96e28; width: 10px; height: 10px; border-radius: 50%; 
            position: absolute; right: 55px; top: 50%; transform: translateY(-50%); 
            box-shadow: 0 0 5px rgba(233, 110, 40, 0.5); z-index: 5;
        }

        .btn-excluir-chat { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; color: #ccc; padding: 10px; transition: 0.2s; z-index: 10; }
        .btn-excluir-chat:hover { color: #ff0000; }

        /* NOVO BOTÃO DE VOLTAR DO CABEÇALHO */
        .btn-voltar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }
        .btn-voltar:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <header id="cabecalho">
        <a href="index.html" class="btn-voltar">← Feed</a>
        <h2>Conversas</h2>
        <div style="width: 50px;"></div>
    </header>

    <main class="container-chats" id="listaChats">
        <p style="text-align: center; color: #999; margin-top: 50px;">Carregando mensagens...</p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!usuarioLogado || !usuarioLogado.email) window.location.href = 'login.html';

        const listaChats = document.getElementById('listaChats');

        try {
            db.collection('chats').where('participantes', 'array-contains', usuarioLogado.email).onSnapshot(async snap => {
                if (snap.empty) {
                    listaChats.innerHTML = `<div style="text-align:center; padding: 40px 20px;"><h3 style="color:#666;">Nenhuma conversa ainda</h3></div>`;
                    return;
                }

                let htmlTemporario = "";
                let chatsAtivos = [];
                
                snap.forEach(d => {
                    const dados = d.data();
                    if (dados.participantes && Array.isArray(dados.participantes)) chatsAtivos.push({ idDoc: d.id, ...dados });
                });
                
                chatsAtivos.sort((a, b) => (b.dataAtualizacao || 0) - (a.dataAtualizacao || 0));

                for (const chat of chatsAtivos) {
                    const outroEmail = chat.participantes.find(e => e !== usuarioLogado.email) || usuarioLogado.email;
                    let nomeOutro = outroEmail.split('@')[0]; 
                    
                    try {
                        const userSnap = await db.collection('usuarios').where('email', '==', outroEmail).get();
                        if(!userSnap.empty) nomeOutro = userSnap.docs[0].data().nome;
                    } catch(e) { }

                    const chaveVisto = 'visto_' + chat.idDoc;
                    const ultimaVezVisto = parseInt(localStorage.getItem(chaveVisto)) || 0;
                    const ehNovaMensagem = chat.ultimoRemetente !== usuarioLogado.email && chat.dataAtualizacao > ultimaVezVisto;

                    let avatarHTML = chat.itemFoto ? `<img src="${chat.itemFoto}" class="avatar-img">` : `<div class="avatar-inicial">${nomeOutro.charAt(0).toUpperCase()}</div>`;
                    let nomePrincipal = chat.itemNome || "Negociação";

                    htmlTemporario += `
                        <div class="card-chat" onclick="abrirChat('${chat.idDoc}', '${outroEmail}')">
                            <div class="avatar-chat-container">${avatarHTML}</div>
                            <div class="info-chat">
                                <h3>${nomePrincipal}</h3>
                                <p style="font-size: 11px; color: #999; margin-bottom: 4px;">com ${nomeOutro}</p>
                                <p style="${ehNovaMensagem ? 'color:#e96e28; font-weight:bold;' : ''}">${ehNovaMensagem ? 'Nova mensagem recebida!' : 'Toque para abrir a conversa...'}</p>
                            </div>
                            ${ehNovaMensagem ? '<div class="nova-msg"></div>' : ''}
                            <button class="btn-excluir-chat" onclick="excluirConversa('${chat.idDoc}', event)">🗑️</button>
                        </div>
                    `;
                }
                listaChats.innerHTML = htmlTemporario;
            });
        } catch(e) { console.error(e); }

        function abrirChat(chatId, outroEmail) {
            localStorage.setItem('visto_' + chatId, Date.now());
            localStorage.setItem('ultimaVezVistoMensagens', Date.now());
            window.location.href = `chat.html?id=${chatId}&email=${outroEmail}`;
        }

        async function excluirConversa(chatId, event) {
            event.stopPropagation();
            if(confirm("Deseja apagar o histórico e ocultar esta conversa da sua lista? (A outra pessoa não perderá o histórico)")) {
                try {
                    const chaveLimpeza = 'apagadoEm_' + usuarioLogado.uid;
                    const updates = {
                        participantes: firebase.firestore.FieldValue.arrayRemove(usuarioLogado.email)
                    };
                    updates[chaveLimpeza] = Date.now(); 

                    await db.collection('chats').doc(chatId).update(updates);
                } catch(e) { alert("Erro ao limpar conversa: " + e.message); }
            }
        }
    </script>
</body>
</html>
